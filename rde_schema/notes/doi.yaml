  $id: https://schemas.icpsr.umich.edu/notes/doi
  usageNotes: |
    ICPSR Digital Object Identifiers (DOIs) are persistent identifiers provided by [DataCite](https://datacite.org/), a DOI registration agency. Each DOI (such as 'https://doi.org/10.3886/ICPSR39523.v1') has three components: 

    1.  `https://doi.org` – the DOI resolver, a web address used to look up a DOI and redirect to the resource
    1.  `10.3886` – the DOI prefix, where '10' identifies the DOI system and '3886' is a unique registrant identifier for ICPSR 
    1. 'ICPSR', the ICPSR study number, and then the version number (e.g., 'ICPSR39523.v1').

    The study number is automatically generated by ICPSR and is unique. Current study numbers are five digits, though four digit numbers were once standard and are still acceptable. Study numbers with less than five digits will have zeroes prepended in the DOI (e.g., Study Number 4 is represented as 10.3886/ICPSR00004').